<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared download · YT Downloader</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    .share-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }
    .share-card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .share-card .ico {
      font-size: 2.5rem;
      margin-bottom: 0.6rem;
      display: block;
      opacity: 0.7;
    }
    .share-card h1 {
      font-size: 1.25rem;
      margin: 0 0 0.4rem;
      font-weight: 600;
      letter-spacing: -0.015em;
    }
    .share-card .sub {
      color: var(--muted-foreground);
      font-size: 0.9rem;
      margin: 0 0 1.25rem;
    }
    .share-card .meta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.4rem;
    }
    .share-card .actions {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .share-card .status {
      margin-top: 1.2rem;
      font-size: 0.82rem;
      color: var(--muted-foreground);
      min-height: 1.2em;
    }
    .share-card .status.error {
      color: var(--destructive);
    }
    .share-card .progress-block {
      text-align: left;
      margin-top: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="share-wrap">
    <div class="card share-card">
      <div class="card-section">
        <span class="ico">⬇</span>
        <h1 id="title">Your friend is sharing a download with you</h1>
        <p class="sub">Format: <span id="format-label" class="badge badge-accent">{{ label }}</span></p>
        <div class="meta">
          <span class="badge" id="type-badge">YouTube</span>
        </div>
        <div class="actions">
          <button id="dl-btn" class="btn btn-primary" type="button">Download now</button>
        </div>
        <p class="status" id="status">Starting download…</p>
        <div id="progress-container"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const url = params.get("url") || "";
      const kind = params.get("kind") || "video";
      const quality = params.get("quality") || "";
      const isPlaylist = /[?&]list=/.test(url);

      const typeBadge = document.getElementById("type-badge");
      const titleEl = document.getElementById("title");
      if (isPlaylist) {
        typeBadge.textContent = "Playlist";
        titleEl.textContent = "Your friend is sharing a playlist with you";
      }

      const status = document.getElementById("status");
      const btn = document.getElementById("dl-btn");
      const progressContainer = document.getElementById("progress-container");

      const buildDirectUrl = (targetUrl, k, q) => {
        const p = new URLSearchParams({
          url: String(targetUrl),
          kind: String(k || "video"),
          request_id: "share_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 6),
        });
        if (q) p.set("quality", String(q));
        return "/api/download?" + p.toString();
      };

      const triggerSingle = async () => {
        status.textContent = "Preparing your download…";
        const dlUrl = buildDirectUrl(url, kind, quality);
        try {
          const res = await fetch(dlUrl);
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `Failed (${res.status})`);
          }
          const blob = await res.blob();
          const disp = res.headers.get("Content-Disposition") || "";
          const m = /filename\*?=(?:UTF-8'')?["']?([^;"']+)/i.exec(disp);
          const filename = m ? decodeURIComponent(m[1]) : "download";
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
          status.textContent = "Saved · " + filename;
        } catch (err) {
          status.textContent = "Failed: " + (err.message || err);
          status.classList.add("error");
        }
      };

      const triggerPlaylist = async () => {
        status.textContent = "Fetching playlist info…";
        let info;
        try {
          const res = await fetch("/api/info", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `Failed (${res.status})`);
          }
          info = await res.json();
        } catch (err) {
          status.textContent = "Could not load playlist: " + (err.message || err);
          status.classList.add("error");
          btn.disabled = true;
          return;
        }

        if (info.type !== "playlist" || !info.entries || !info.entries.length) {
          // Fall back to single
          return triggerSingle();
        }

        btn.disabled = true;
        const header = document.createElement("div");
        header.className = "progress-block";
        header.innerHTML = `
          <div class="row">
            <span class="title">Downloading playlist · ${info.entries.length} videos</span>
            <span class="stats">0 / ${info.entries.length}</span>
          </div>
          <div class="progress-track"><div class="progress-bar" style="width: 0%"></div></div>
        `;
        progressContainer.appendChild(header);
        const stats = header.querySelector(".stats");
        const bar = header.querySelector(".progress-bar");

        let done = 0;
        for (const entry of info.entries) {
          const sub = document.createElement("div");
          sub.className = "progress-block";
          sub.innerHTML = `
            <div class="row">
              <span class="title">${escapeHtml((entry.title || "video").slice(0, 60))}</span>
              <span class="stats">…</span>
            </div>
            <div class="progress-track"><div class="progress-bar indeterminate"></div></div>
          `;
          progressContainer.appendChild(sub);
          const subStats = sub.querySelector(".stats");
          const subBar = sub.querySelector(".progress-bar");

          try {
            const dlUrl = buildDirectUrl(entry.webpage_url, kind, quality);
            const res = await fetch(dlUrl);
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              throw new Error(err.detail || `Failed (${res.status})`);
            }
            const blob = await res.blob();
            const disp = res.headers.get("Content-Disposition") || "";
            const m = /filename\*?=(?:UTF-8'')?["']?([^;"']+)/i.exec(disp);
            const filename = m ? decodeURIComponent(m[1]) : "download";
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(a.href);
            subStats.textContent = "Done";
            subBar.classList.remove("indeterminate");
            subBar.style.width = "100%";
            subBar.style.background = "var(--primary)";
          } catch (err) {
            subStats.textContent = "Failed: " + (err.message || err);
            subBar.style.background = "var(--destructive)";
          }
          done += 1;
          stats.textContent = `${done} / ${info.entries.length}`;
          bar.style.width = ((done / info.entries.length) * 100).toFixed(1) + "%";
          await new Promise((r) => setTimeout(r, 400));
        }
        status.textContent = `Done · ${info.entries.length} file${info.entries.length === 1 ? "" : "s"} downloaded`;
        bar.style.background = "var(--primary)";
      };

      const escapeHtml = (s) =>
        String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[c]));

      let triggered = false;
      const tryTrigger = () => {
        if (triggered) return;
        triggered = true;
        if (isPlaylist) {
          triggerPlaylist();
        } else {
          triggerSingle();
        }
      };

      btn.addEventListener("click", tryTrigger);
      window.addEventListener("load", () => {
        setTimeout(tryTrigger, 500);
      });
    })();
  </script>
</body>
</html>
