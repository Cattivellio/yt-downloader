<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VidDown</title>
  <meta name="description" content="Minimal video/audio downloader for YouTube, Instagram, and TikTok." />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%2327272a'/%3E%3Cpath fill='%23fafafa' d='M12 5v10m0 0l4-4m-4 4l-4-4' stroke='%23fafafa' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/app.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-mark">⬇</span>
          <span>VidDown</span>
        </div>
        <div class="header-spacer"></div>
        <button id="theme-toggle" class="btn-icon" type="button" aria-label="Toggle theme">
          <span class="theme-icon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <h1>Download videos &amp; audio</h1>
        <p>YouTube, Instagram, TikTok. Paste a link, pick a format, done.</p>
      </section>

      <form id="url-form" class="url-bar" autocomplete="off">
        <div class="input-wrap">
          <input
            id="url-input"
            class="input"
            type="text"
            name="url"
            placeholder="https://www.youtube.com/watch?v=…"
            spellcheck="false"
            autocapitalize="off"
            autocorrect="off"
            required
          />
          <span id="url-type" class="url-type" aria-hidden="true"></span>
        </div>
        <button id="url-submit" class="btn btn-primary" type="submit">Get video</button>
      </form>

      <section id="results" aria-live="polite">
        <div class="card">
          <div class="card-section empty">
            <span class="ico">▶</span>
            <h3>Ready when you are</h3>
            <p>Paste a YouTube, Instagram, or TikTok URL above to start.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      Powered by yt-dlp · YouTube, Instagram &amp; TikTok · runs locally · no tracking
    </footer>
  </div>
</body>
</html>
